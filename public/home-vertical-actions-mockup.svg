  </text>
  <rect x="1080" y="348" width="160" height="48" rx="16" fill="#2563EB"/>
  <text x="1160" y="379" text-anchor="middle" fill="white" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600">
