  </text>

  <rect x="120" y="450" width="1160" height="108" rx="28" fill="#FFFFFF"/>
  <rect x="120" y="450" width="1160" height="108" rx="28" stroke="#E5E7EB"/>
  <text x="160" y="504" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="600">
