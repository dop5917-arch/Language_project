  </text>
  <rect x="1112" y="216" width="128" height="48" rx="16" fill="#059669"/>
  <text x="1176" y="247" text-anchor="middle" fill="white" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">
    24
  </text>

  <rect x="120" y="318" width="1160" height="108" rx="28" fill="#FFFFFF"/>
  <rect x="120" y="318" width="1160" height="108" rx="28" stroke="#E5E7EB"/>
  <text x="160" y="372" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="600">
