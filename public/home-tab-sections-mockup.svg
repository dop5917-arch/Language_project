<svg width="1400" height="860" viewBox="0 0 1400 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="860" fill="#F8FAFC"/>

  <text x="120" y="94" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="600">
    Вариант: действия как разделы сайта
  </text>
  <text x="120" y="130" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="18">
    Плоские строки-вкладки без плиток: больше похоже на навигацию разделов.
  </text>

  <rect x="120" y="188" width="1160" height="74" rx="18" fill="#FFFFFF"/>
  <rect x="120" y="188" width="1160" height="74" rx="18" stroke="#E5E7EB"/>
  <text x="160" y="234" fill="#059669" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">
    Пора повторить
  </text>
  <text x="1172" y="234" text-anchor="end" fill="#059669" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">
    24
  </text>

  <line x1="120" y1="287" x2="1280" y2="287" stroke="#E5E7EB"/>
  <text x="160" y="330" fill="#2563EB" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">
    Создать карточки с AI
  </text>
  <text x="1172" y="330" text-anchor="end" fill="#2563EB" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600">
    Открыть
  </text>

  <line x1="120" y1="383" x2="1280" y2="383" stroke="#E5E7EB"/>
  <text x="160" y="426" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">
    Таймер
  </text>
  <text x="1172" y="426" text-anchor="end" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600">
    15 мин
  </text>

  <line x1="120" y1="479" x2="1280" y2="479" stroke="#E5E7EB"/>
  <text x="160" y="522" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">
    Повторение всех колод
  </text>
  <text x="1172" y="522" text-anchor="end" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600">
    Старт
  </text>

  <line x1="120" y1="575" x2="1280" y2="575" stroke="#E5E7EB"/>

  <text x="120" y="660" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="18">
    Преимущества:
  </text>
  <text x="150" y="700" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18">
    • минимум визуального шума
  </text>
  <text x="150" y="734" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18">
    • ощущение разделов приложения, а не четырёх карточек
  </text>
  <text x="150" y="768" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18">
    • легко адаптировать под мобильный экран
  </text>
</svg>
